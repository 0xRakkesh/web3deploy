name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      projectId:
        description: 'Project ID'
        required: true
        type: string
      gitRepoUrl:
        description: 'Git Repository URL'
        required: true
        type: string
      rootDir:
        description: 'Root Directory (optional)'
        required: false
        type: string
      framework:
        description: 'Framework override (optional)'
        required: false
        type: string
      installCommand:
        description: 'Install Command override (optional)'
        required: false
        type: string
      buildCommand:
        description: 'Build Command override (optional)'
        required: false
        type: string
      outputDir:
        description: 'Output Directory override (optional)'
        required: false
        type: string

jobs:
  build:
    name: Build ${{ inputs.projectId }}
    runs-on: ubuntu-latest
    
    # We want a clean environment with plenty of memory for the heavy lifting
    steps:
      - name: Checkout w3deploy
        uses: actions/checkout@v4

      - name: Setup Node for Builder
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install builder dependencies
        working-directory: ./build-server
        run: npm ci || npm install

      - name: Run Build Pipeline
        working-directory: ./build-server
        env:
          PROJECT_ID: ${{ inputs.projectId }}
          GIT_REPO_URL: ${{ inputs.gitRepoUrl }}
          ROOT_DIR: ${{ inputs.rootDir }}
          FRAMEWORK: ${{ inputs.framework }}
          INSTALL_COMMAND: ${{ inputs.installCommand }}
          BUILD_COMMAND: ${{ inputs.buildCommand }}
          OUTPUT_DIR: ${{ inputs.outputDir }}
          # Secrets
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: bash github-main.sh
